# Monorepo: build from repository root so pnpm workspaces resolve.
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # nix-portable supplies nix-shell for ensure:pcsx-wasm (no system Nix on Netlify images).
  command = "bash scripts/netlify-build.sh"
  publish = "apps/web/dist"

[build.environment]
  # Matches `nodejs_24` in `flake.nix` and Netlify’s current Node line (24.x).
  NODE_VERSION = "24"

# Emulator-first: root goes to static PCSX-wasm shell (see `apps/web/public/pcsx-wasm/`).
[[redirects]]
  from = "/"
  to = "/pcsx-wasm/index.html"
  status = 302

# Client-side routing (Vite SPA) for app routes — static files under /pcsx-wasm/ are served first.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Match Vite dev server (apps/web/vite.config.ts): helps Chromium crossOriginIsolated + worker/WASM paths.
[[headers]]
  for = "/pcsx-wasm/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"
