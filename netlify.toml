# Monorepo: build from repository root so pnpm workspaces resolve.
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @riskbreaker/web build"
  publish = "apps/web/dist"

[build.environment]
  # Matches `nodejs_24` in `flake.nix` and Netlify’s current Node line (24.x).
  NODE_VERSION = "24"

# Emulator-first: root goes to static PCSX kxkx shell (see `apps/web/public/pcsx-kxkx/`).
[[redirects]]
  from = "/"
  to = "/pcsx-kxkx/index.html"
  status = 302

# Client-side routing (Vite SPA) for app routes — static files under /pcsx-kxkx/ are served first.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
