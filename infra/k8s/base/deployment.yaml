# Placeholder workload — swap image for the static `apps/web` image (Dockerfile `web` target).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: riskbreaker-web
  labels:
    app.kubernetes.io/name: riskbreaker-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: riskbreaker-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: riskbreaker-web
    spec:
      containers:
        - name: web
          # Replace with your registry, e.g. ghcr.io/org/riskbreaker-web:tag
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
