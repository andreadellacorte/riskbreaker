name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Same path as Netlify: Node from GHA + nix-portable (no Determinate Nix installer).
  # Catches “green Nix job, red Netlify” when only flake devShell was exercised.
  netlify-parity:
    name: Netlify parity — nix-portable + Vite build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Web build (netlify-build.sh)
        run: bash scripts/netlify-build.sh

  nix:
    name: Nix — lint, build, typecheck, unit, Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Install dependencies and run checks
        run: |
          nix develop --accept-flake-config --command bash -euxo pipefail -c \
            "pnpm install --frozen-lockfile && pnpm exec playwright install --with-deps chromium && pnpm lint && pnpm build && pnpm typecheck && pnpm test && pnpm e2e"

  terraform:
    name: Terraform — fmt, validate, plan, apply (main)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: terraform fmt -check -recursive infra/terraform

      - name: Init and validate
        working-directory: infra/terraform/environments/github
        run: |
          terraform init -input=false
          terraform validate

      # Same-repo only: fork PRs do not receive secrets; plan needs TERRAFORM_GITHUB_TOKEN to call the GitHub API.
      - name: Terraform plan (GitHub)
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        working-directory: infra/terraform/environments/github
        env:
          TF_VAR_github_token: ${{ secrets.TERRAFORM_GITHUB_TOKEN }}
        run: terraform plan -input=false -no-color

      # Applies repo settings (e.g. has_wiki, has_projects). Requires secret TERRAFORM_GITHUB_TOKEN. For repeatable
      # applies across CI runs, configure a remote backend in versions.tf — local state is not persisted on runners.
      - name: Terraform apply (GitHub, main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: infra/terraform/environments/github
        env:
          TF_VAR_github_token: ${{ secrets.TERRAFORM_GITHUB_TOKEN }}
        run: terraform apply -input=false -auto-approve -no-color
